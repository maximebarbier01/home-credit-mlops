fp_cost = 1.0
threshold_grid_size = 401

[training]
cv_folds = 5
n_jobs = -1

[mlflow]
experiment_name = "home-credit-scoring"
backend_store_path = "mlflow.db"
artifact_root = "mlartifacts"
