[paths]
raw_dir = "data/raw"
interim_dir = "data/interim"
processed_dir = "data/processed"
reports_dir = "reports"
artifacts_dir = "artifacts"

[dataset]
default_train_path = "data/processed/train_features.parquet"
target_column = "TARGET"
id_column = "SK_ID_CURR"
